<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>PlantUML Varianten</title>
<style>body{background:#0B0C0F;color:#fff;font-family:sans-serif;padding:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}
.card{background:#1a1a2e;border:1px solid #333;border-radius:12px;padding:20px}
.card h3{color:#31F1A8;margin-bottom:10px}
.card img{width:100%;border-radius:8px}
.full{grid-column:span 2}
</style></head><body>
<h1 style="color:#31F1A8">PlantUML — Styling Optionen</h1>
<div class="grid">
<div class="card"><h3>Dark Background (#0B0C0F)</h3><img src="plantuml-dark.svg"></div>
<div class="card"><h3>Transparent (Wiki BG scheint durch)</h3><img src="plantuml-transparent.svg"></div>
<div class="card full"><h3>Brand-Farben — EU AI Act Risiko-Pyramide</h3><img src="plantuml-risiko.svg"></div>
</div></body></html>
