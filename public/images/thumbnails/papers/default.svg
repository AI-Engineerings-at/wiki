<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48">
  <rect width="64" height="48" rx="6" fill="#1e293b"/>
  <!-- Stack of papers (research) -->
  <!-- Back paper -->
  <rect x="20" y="10" width="30" height="36" rx="2" fill="#334155" transform="rotate(-5,35,28)"/>
  <!-- Middle paper -->
  <rect x="18" y="9" width="30" height="36" rx="2" fill="#475569" transform="rotate(-2,33,27)"/>
  <!-- Front paper -->
  <rect x="14" y="8" width="30" height="36" rx="2" fill="#4262FF"/>
  <!-- Paper lines -->
  <rect x="19" y="15" width="20" height="2" rx="1" fill="#94a3b8"/>
  <rect x="19" y="20" width="20" height="2" rx="1" fill="#94a3b8"/>
  <rect x="19" y="25" width="15" height="2" rx="1" fill="#94a3b8"/>
  <rect x="19" y="30" width="18" height="2" rx="1" fill="#94a3b8"/>
  <!-- Citation marker -->
  <circle cx="44" cy="10" r="5" fill="#f59e0b"/>
  <text x="41" y="13" font-family="serif" font-size="7" fill="white" font-weight="bold">"</text>
</svg>
