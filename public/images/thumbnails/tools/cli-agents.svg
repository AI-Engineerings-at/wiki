<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48">
  <rect width="64" height="48" rx="6" fill="#1e293b"/>
  <!-- Terminal window -->
  <rect x="6" y="8" width="52" height="34" rx="3" fill="#0f172a"/>
  <!-- Title bar -->
  <rect x="6" y="8" width="52" height="8" rx="3" fill="#1e3a5f"/>
  <rect x="6" y="12" width="52" height="4" fill="#1e3a5f"/>
  <!-- Window dots -->
  <circle cx="13" cy="12" r="2" fill="#ef4444"/>
  <circle cx="20" cy="12" r="2" fill="#f59e0b"/>
  <circle cx="27" cy="12" r="2" fill="#22c55e"/>
  <!-- Prompt line 1 -->
  <text x="10" y="26" font-family="monospace" font-size="6" fill="#4ade80">$</text>
  <rect x="16" y="22" width="20" height="2" rx="1" fill="#94a3b8"/>
  <!-- Cursor -->
  <rect x="38" y="21" width="3" height="5" rx="0.5" fill="#4262FF"/>
  <!-- Response line -->
  <rect x="10" y="29" width="32" height="2" rx="1" fill="#4262FF" opacity="0.8"/>
  <!-- Prompt line 2 -->
  <text x="10" y="38" font-family="monospace" font-size="6" fill="#4ade80">$</text>
  <rect x="16" y="34" width="10" height="2" rx="1" fill="#94a3b8"/>
</svg>
