<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48">
  <rect width="64" height="48" rx="6" fill="#1e293b"/>
  <!-- Brain outline left hemisphere -->
  <path d="M20,34 Q8,30 10,20 Q12,10 22,10 Q28,10 32,16" fill="none" stroke="#4262FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Brain outline right hemisphere -->
  <path d="M32,16 Q36,10 42,10 Q52,10 54,20 Q56,30 44,34" fill="none" stroke="#4262FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom connection -->
  <path d="M20,34 Q26,38 32,36 Q38,38 44,34" fill="none" stroke="#4262FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Brain center line -->
  <line x1="32" y1="16" x2="32" y2="36" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Neural dots -->
  <circle cx="20" cy="20" r="2" fill="#94a3b8"/>
  <circle cx="28" cy="16" r="2" fill="#94a3b8"/>
  <circle cx="36" cy="16" r="2" fill="#94a3b8"/>
  <circle cx="44" cy="20" r="2" fill="#94a3b8"/>
  <circle cx="22" cy="28" r="2" fill="#94a3b8"/>
  <circle cx="42" cy="28" r="2" fill="#94a3b8"/>
  <!-- Neural connections -->
  <line x1="20" y1="20" x2="28" y2="16" stroke="#4262FF" stroke-width="1" opacity="0.5"/>
  <line x1="28" y1="16" x2="36" y2="16" stroke="#4262FF" stroke-width="1" opacity="0.5"/>
  <line x1="36" y1="16" x2="44" y2="20" stroke="#4262FF" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="20" x2="22" y2="28" stroke="#4262FF" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="20" x2="42" y2="28" stroke="#4262FF" stroke-width="1" opacity="0.5"/>
</svg>
